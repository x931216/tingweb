<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>周廷亦是大帥哥</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 800px; margin-top: 50px; }
        .card { margin-bottom: 10px; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 30px; }
        .chat-container { position: fixed; bottom: 20px; right: 20px; width: 300px; height: 400px; background: white; border: 1px solid #ccc; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .chat-header { background: #007bff; color: white; padding: 10px; border-radius: 10px 10px 0 0; cursor: pointer; }
        .chat-body { padding: 10px; height: 300px; overflow-y: auto; }
        .chat-input { padding: 10px; border-top: 1px solid #ccc; }
        .chat-messages { margin-bottom: 10px; }
        .message { margin: 5px 0; }
        .user { text-align: right; }
        .bot { text-align: left; }
        .loading { text-align: center; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="display-4 text-primary">周廷亦是大帥哥</h1>
            <p class="lead">國立虎尾科技大學電機工程系最新動態</p>
            <button class="btn btn-primary" onclick="loadNews()">載入最新動態</button>
        </div>
        <div id="newsContainer" class="row">
            <div class="loading">點擊上方按鈕載入新聞...</div>
        </div>
    </div>

    <!-- Chatbot -->
    <div class="chat-container" id="chatContainer">
        <div class="chat-header" onclick="toggleChat()">AI 聊天機器人</div>
        <div class="chat-body" id="chatBody">
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">你好！我是AI聊天機器人，有什麼關於電機系的問題嗎？</div>
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="userInput" class="form-control" placeholder="輸入你的問題..." onkeypress="handleKeyPress(event)">
            <button class="btn btn-primary mt-2" onclick="sendMessage()">發送</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let newsData = [];

        async function loadNews() {
            const container = document.getElementById('newsContainer');
            container.innerHTML = '<div class="loading">載入中...</div>';

            try {
                // 使用 CORS proxy 來繞過 CORS 限制
                const proxyUrl = 'https://api.allorigins.win/get?url=';
                const targetUrl = encodeURIComponent('http://nfuee.nfu.edu.tw/');
                const response = await fetch(proxyUrl + targetUrl);
                const data = await response.json();
                const html = data.contents;

                // 解析 HTML
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const h2Tags = doc.querySelectorAll('h2');
                newsData = [];

                h2Tags.forEach(h2 => {
                    const aTag = h2.querySelector('a');
                    if (aTag && aTag.textContent.trim()) {
                        const title = aTag.textContent.trim();
                        let href = aTag.getAttribute('href');
                        if (!href.startsWith('http')) {
                            href = 'http://nfuee.nfu.edu.tw/' + href;
                        }
                        newsData.push({ title, link: href });
                    }
                });

                displayNews();
            } catch (error) {
                console.error('載入新聞失敗:', error);
                container.innerHTML = '<div class="alert alert-danger">載入新聞失敗，請稍後再試。</div>';
            }
        }

        function displayNews() {
            const container = document.getElementById('newsContainer');
            if (newsData.length === 0) {
                container.innerHTML = '<div class="alert alert-info">沒有找到新聞。</div>';
                return;
            }

            container.innerHTML = newsData.map(item => `
                <div class="col-md-12">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">
                                <a href="${item.link}" target="_blank" class="text-decoration-none">${item.title}</a>
                            </h5>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleChat() {
            const chat = document.getElementById('chatContainer');
            chat.style.display = chat.style.display === 'none' ? 'block' : 'none';
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            addMessage('user', message);
            input.value = '';

            // 模擬聊天回應
            const response = generateResponse(message);
            setTimeout(() => addMessage('bot', response), 500);
        }

        function generateResponse(message) {
            if (newsData.length === 0) {
                return "請先載入新聞資料。";
            }

            const keywords = message.split(' ');
            const relevantNews = newsData.filter(item =>
                keywords.some(keyword => item.title.includes(keyword))
            );

            if (relevantNews.length > 0) {
                return "根據你的問題，以下是相關資訊：<br>" +
                    relevantNews.map(item =>
                        `${item.title} - <a href="${item.link}" target="_blank">查看詳情</a>`
                    ).join('<br>');
            } else {
                return "抱歉，我沒有找到相關資訊。請試試其他關鍵字，如「獎學金」或「公告」。";
            }
        }

        function addMessage(sender, text) {
            const messages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.innerHTML = `<div class="alert alert-${sender === 'user' ? 'primary' : 'secondary'}">${text}</div>`;
            messages.appendChild(messageDiv);
            messages.scrollTop = messages.scrollHeight;
        }

        // 頁面載入時自動載入新聞
        window.onload = loadNews;
    </script>
</body>
</html>
